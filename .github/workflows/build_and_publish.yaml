name: Build and publish base image

on:
  push

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    environment: office-linux-actions
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Build and publish the image
        run: |
          echo "${{ secrets.OFFICE_OS_TOKEN }}" | podman login --username JakubSzukala --password-stdin ghcr.io
          podman build -t ghcr.io/jakubszukala/office-os:latest .
          podman push ghcr.io/jakubszukala/office-os:latest
  
      - name: Build .iso image
        run: |
          mkdir -p ./output
          sudo podman run \
            --rm \
            --privileged \
            --pull=newer \
            --security-opt label=type:unconfined_t \
            -v ./config.toml:/config.toml:ro \
            -v ./output:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --in-vm \
            --type iso \
            --use-librepo=True \
            --rootfs ext4 \
            ghcr.io/jakubszukala/office-os:latest

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: office-os-artifacts
          path: |
            output
